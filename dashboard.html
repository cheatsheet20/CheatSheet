<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CheatSheet</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dash-page"> <div class="grid-container">
        <div class="box large">
            <img src="Logo.png" alt="Logo" width="60">
            <h2>CheatSheet</h2>
            <p>Less to read, more to lead.</p>
        </div>
        <div class="box small"><i class="fas fa-university"></i><h3>Varsity Wing</h3></div>
        <div class="box small"><i class="fas fa-hand-holding-medical"></i><h3>Medical Wing</h3></div>
        <div class="box small"><i class="fas fa-leaf"></i><h3>Agri Wing</h3></div>
        <div class="box wide"><h3>Results & News</h3><p>BUP/BUET Updates</p></div>
        <div class="box small"><i class="fas fa-chart-pie"></i><h3>QB Analysis</h3></div>
        <div class="box small"><i class="fas fa-box-open"></i><h3>Miscellaneous</h3></div>
        <div class="box founder">
            <div><h4>Tamim Mahmud</h4><p>Founder, CheatSheet</p></div>
            <i class="fas fa-user-circle"></i>
        </div>
    </div>
</body>
</html>
